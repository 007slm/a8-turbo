# OJP Server 智能缓存配置示例

# ==============================================
# 基础配置
# ==============================================

# 启用智能缓存功能
smart.cache.enabled=true

# 启用结果压缩（减少存储空间）
smart.cache.compression.enabled=true

# 启用指标收集
smart.cache.metrics.enabled=true

# 启用事务感知（确保ACID特性）
smart.cache.transaction.aware=true

# ==============================================
# StarRocks 数据库配置
# ==============================================

# StarRocks 连接信息
smart.cache.starrocks.url=jdbc:mysql://localhost:9030/smart_cache
smart.cache.starrocks.username=root
smart.cache.starrocks.password=password
smart.cache.starrocks.driver=com.mysql.cj.jdbc.Driver

# 连接池配置
smart.cache.starrocks.pool.max=20
smart.cache.starrocks.pool.min=5
smart.cache.starrocks.pool.idle.timeout=10m
smart.cache.starrocks.pool.max.lifetime=30m

# 缓存数据库和表名
smart.cache.starrocks.database=smart_cache
smart.cache.starrocks.table=query_cache

# ==============================================
# 缓存 TTL 配置
# ==============================================

# 默认缓存生存时间
smart.cache.default.ttl=10m

# 最大允许的缓存生存时间
smart.cache.max.ttl=24h

# 过期缓存清理间隔
smart.cache.cleanup.interval=1h

# ==============================================
# 缓存键配置
# ==============================================

# 缓存键前缀
smart.cache.key.prefix=ojp_cache

# 缓存键分隔符
smart.cache.key.separator=:

# 缓存键生成策略
# 可选值: QUERY_HASH_ONLY, QUERY_HASH_WITH_PARAMS, TABLE_BASED, QUERY_TYPE_BASED, FULL_CONTEXT
smart.cache.key.strategy=QUERY_HASH_WITH_PARAMS

# ==============================================
# 系统限制配置
# ==============================================

# 最大允许的缓存规则数量
smart.cache.max.rules=100

