server:
  port: 8010 # 统一端口：HTTP + gRPC
  servlet:
    context-path: /

spring:
  application:
    name: ojp-server
  main:
    web-application-type: servlet
  web:
    cors:
      allowed-origins: "*"
      allowed-methods: GET,POST,PUT,DELETE,OPTIONS
      allowed-headers: "*"
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  # Redis配置
  redis:
    host: ${REDIS_HOST:127.0.0.1}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DATABASE:0}
    timeout: ${REDIS_TIMEOUT:10000ms}
    ssl:
      enabled: ${REDIS_SSL:false}
    lettuce:
      pool:
        max-active: ${REDIS_MAX_ACTIVE:20}
        max-idle: ${REDIS_MAX_IDLE:10}
        min-idle: ${REDIS_MIN_IDLE:5}
        max-wait: ${REDIS_MAX_WAIT:2000ms}

# Spring gRPC 配置 - 单端口模式
grpc:
  server:
    # 不指定独立端口，使用 HTTP 服务器端口
    # port: 1059  # 注释掉独立端口
    max-inbound-message-size: 4194304 # 4MB
    # 启用HTTP/2支持
    http2:
      enabled: true
    # 安全配置
    security:
      csrf:
        enabled: false # gRPC请求不兼容CSRF保护
    # 拦截器配置
    interceptors:
    - org.openjdbcproxy.grpc.server.interceptor.GlobalLoggingInterceptor

# OJP Server 自定义配置
ojp:
  server:
    thread-pool-size: 200
    connection-idle-timeout: 30000 # 30秒
    circuit-breaker:
      timeout: 60000 # 60秒
      threshold: 3
    slow-query-segregation:
      enabled: true
      slow-slot-percentage: 20
      idle-timeout: 10000 # 10秒
      slow-slot-timeout: 120000 # 120秒
      fast-slot-timeout: 60000 # 60秒
  # API配置
  api:
    base-path: /api
    cache:
      base-path: /api/cache

  # Redis配置（与Spring Redis配置保持一致）
  redis:
    enabled: true # Redis是核心依赖，默认启用
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DATABASE:0}
    timeout: ${REDIS_TIMEOUT:10000}
    max-active: ${REDIS_MAX_ACTIVE:20}
    max-idle: ${REDIS_MAX_IDLE:10}
    min-idle: ${REDIS_MIN_IDLE:5}
    max-wait: ${REDIS_MAX_WAIT:2000}
    ssl: ${REDIS_SSL:false}

  # 监控配置
  monitoring:
    opentelemetry:
      enabled: true
      endpoint: ""
    prometheus:
      port: 9090
      allowed-ips: "*"

  # 安全配置
  security:
    allowed-ips: "*" # 允许所有IP访问

# 日志配置
logging:
  level:
    org.openjdbcproxy: INFO
    org.springframework: INFO
    org.springframework.web: INFO
    org.springframework.grpc: DEBUG
    io.grpc: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/ojp-server.log
    max-size: 100MB
    max-history: 30

# 管理端点配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /api/actuator
  endpoint:
    health:
      show-details: always
      show-components: always
  metrics:
    export:
      prometheus:
        enabled: true
