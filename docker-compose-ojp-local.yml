networks:
  a8:
    external: false

services:
  # 开发环境代理服务 - 将请求转发到宿主机的 ojp-server (8010端口)
  ojp-server:
    image: alpine/socat:latest
    container_name: ojp-server-dev-proxy
    networks:
      - a8
    # 使用entrypoint确保参数正确传递
    entrypoint: ["socat"]
    command: ["TCP-LISTEN:8010,fork,reuseaddr", "TCP:host.docker.internal:8010"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8010"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  # 开发环境代理服务 - 将请求转发到宿主机的 ojp-ui (5173端口)
  ojp-ui:
    image: alpine/socat:latest
    container_name: ojp-ui-dev-proxy
    networks:
      - a8
    # 使用entrypoint确保参数正确传递
    entrypoint: ["socat"]
    command: ["TCP-LISTEN:5173,fork,reuseaddr", "TCP:host.docker.internal:5173"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "5173"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  # 开发环境代理服务 - 将请求转发到宿主机的 ojp-ui (5173端口)
  shopservice:
    image: alpine/socat:latest
    container_name: shopservice-dev-proxy
    networks:
      - a8
    # 使用entrypoint确保参数正确传递
    entrypoint: [ "socat" ]
    command: [ "TCP-LISTEN:8280,fork,reuseaddr", "TCP:host.docker.internal:8280" ]
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "nc", "-z", "localhost", "8280" ]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
