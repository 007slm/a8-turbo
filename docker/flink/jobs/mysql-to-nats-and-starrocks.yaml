################################################################################
# 一体化Flink CDC作业配置文件
# 功能：从MySQL读取CDC变更数据，同时写入NATS和StarRocks
# 架构：方案1 - 直接写入模式（推荐）
################################################################################

# 数据源配置 - 从MySQL读取CDC变更数据
source:
  # 数据源类型为MySQL
  type: mysql
  
  # MySQL服务器连接信息
  hostname: mysql
  port: 3306
  username: smartcache
  password: smartcache
  
  # 监控的表（smartcache数据库中的所有表）
  tables: smartcache.\.*
  
  # MySQL复制服务器ID范围（避免与主服务器冲突）
  server-id: 5400-5404
  
  # 时区设置
  server-time-zone: UTC

# 数据转换配置 - 将数据写入NATS
transform:
  # NATS JetStream写入器
  - type: nats
    name: NATS JetStream Writer
    
    # NATS服务器连接URL
    url: nats://nats:4222
    
    # 消息主题，使用表名作为变量，每个表对应一个主题
    subject: mysql-cdc-changes.{tableName}
    
    # NATS流名称
    stream: cdc-stream
    
    # 如果流不存在则自动创建
    create-stream: true
    
    # JetStream确认策略 - 显式确认确保消息可靠传递
    ack-policy: explicit
    
    # 最大待处理消息数 - 控制缓冲区大小防止内存溢出
    max-pending: 100000
    
    # 消息头信息 - 便于监控和调试
    headers:
      table-name: "{tableName}"
      operation-type: "{operationType}"
      timestamp: "{timestamp}"
    
    # 消费者配置 - 用于监控每个表的消费情况
    consumer-name: flink-cdc-producer-{tableName}
    
    # 交付策略 - 接收所有历史消息和新消息确保数据完整性
    deliver-policy: all
    
    # 确认等待时间 - 30秒内未确认的消息将被重新投递
    ack-wait: 30s

# 数据接收配置 - 将数据写入StarRocks
sink:
  # 目标类型为StarRocks
  type: starrocks
  name: StarRocks Sink
  
  # StarRocks连接信息
  jdbc-url: jdbc:mysql://starrocks:9030
  load-url: starrocks:8080
  username: root
  password: ""
  
  # 表属性配置
  table.create.properties.replication_num: 1
  
  # 实时刷新配置 - 最大实时性
  # 每条记录立即刷新到StarRocks
  sink.buffer-flush.max-rows: 1
  sink.buffer-flush.interval: 0s
  
  # 消费完成通知 - 发送到监控流
  post-sink:
    - type: nats
      name: Consumption Completed Notification
      url: nats://nats:4222
      subject: monitoring.{tableName}
      stream: monitoring-stream
      headers:
        event-type: "message-consumed"
        table-name: "{tableName}"
        timestamp: "{timestamp}"
        original-subject: "mysql-cdc-changes.{tableName}"

# 管道配置
pipeline:
  # 作业名称
  name: MySQL to NATS and StarRocks Sync
  
  # 并行度设置
  parallelism: 1
  
  # 检查点间隔 - 每秒进行一次检查点确保数据一致性
  checkpoint:
    interval: 1000