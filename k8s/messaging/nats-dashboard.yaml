apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats-dashboard
  namespace: a8-turbo
  labels:
    app.kubernetes.io/name: nats-dashboard
    app.kubernetes.io/component: messaging
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nats-dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nats-dashboard
        app.kubernetes.io/component: messaging
    spec:
      containers:
      - name: nats-dashboard
        image: natsio/nats-server-config-reloader:latest
        ports:
        - containerPort: 8080
          name: web
        env:
        - name: NATS_URL
          value: "http://nats.a8-turbo:8222"
        volumeMounts:
        - name: dashboard-config
          mountPath: /etc/nats-dashboard/config.json
          subPath: dashboard-config.json
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: dashboard-config
        configMap:
          name: nats-config

---
apiVersion: v1
kind: Service
metadata:
  name: nats-dashboard
  namespace: a8-turbo
  labels:
    app.kubernetes.io/name: nats-dashboard
    app.kubernetes.io/component: messaging
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    name: web
  selector:
    app.kubernetes.io/name: nats-dashboard