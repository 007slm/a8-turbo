apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-exporter
  namespace: a8-turbo-monitoring
  labels:
    app.kubernetes.io/name: mysql-exporter
    app.kubernetes.io/component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mysql-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mysql-exporter
        app.kubernetes.io/component: monitoring
    spec:
      containers:
      - name: mysql-exporter
        image: prom/mysqld-exporter:latest
        ports:
        - containerPort: 9104
          name: metrics
        env:
        - name: DATA_SOURCE_NAME
          value: "root:a8@tcp(mysql.a8-turbo:3306)/"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /metrics
            port: 9104
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /metrics
            port: 9104
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: mysql-exporter
  namespace: a8-turbo-monitoring
  labels:
    app.kubernetes.io/name: mysql-exporter
    app.kubernetes.io/component: monitoring
spec:
  type: ClusterIP
  ports:
  - port: 9104
    targetPort: 9104
    name: metrics
  selector:
    app.kubernetes.io/name: mysql-exporter

---
