services:
  # OJP Server服务
  ojp-server:
    build:
      context: ./ojp
      dockerfile: ojp-server/Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    image: fluxdb-server:0.0.8-alpha
    container_name: ojp-server
    # 移除对外暴露的端口，通过Kong网关访问
    # ports:
    #   - "8010:8010"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JAVA_OPTS=-Xms512m -Xmx1024m
      - MAVEN_CONFIG=/root/.m2
      - MAVEN_OPTS=-Dmaven.repo.local=/root/.m2/repository
    depends_on:
      - redis
    networks:
      - a8
      
    volumes:
      - ./docker/ojp/server/logs:/app/logs
      - ./docker/ojp/server/application.yml:/app/config/application.yml
      - C:\Users\007sl\.m2\repository:/root/.m2/repository
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/api/actuator/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3


  # OJP UI服务
  ojp-ui:
    build:
      context: ./ojp/ojp-ui
      dockerfile: Dockerfile
    image: ojp-ui:latest
    container_name: ojp-ui
    # 移除对外暴露的端口，通过Kong网关访问
    # ports:
    #   - "5173:5173"
    entrypoint: ["sh", "-lc"]
    command: |
      set -e
      echo "[ojp-ui] waiting for ojp-server:8010 health..."
      for i in $(seq 1 120); do
        wget --no-verbose --tries=1 --spider http://ojp-server:8010/api/actuator/health >/dev/null 2>&1 && break || sleep 1
      done
      wget --no-verbose --tries=1 --spider http://ojp-server:8010/api/actuator/health >/dev/null 2>&1 || { echo "[ojp-ui] ojp-server not ready after 120s"; exit 1; }
      echo "[ojp-ui] waiting for shopservice:8280 health..."
      for i in $(seq 1 120); do
        wget --no-verbose --tries=1 --spider http://shopservice:8280/actuator/health >/dev/null 2>&1 && break || sleep 1
      done
      wget --no-verbose --tries=1 --spider http://shopservice:8280/actuator/health >/dev/null 2>&1 || { echo "[ojp-ui] shopservice not ready after 120s"; exit 1; }
      exec npm run dev -- --host 0.0.0.0 --config /app/vite.config.js
    networks:
      - a8
      
    volumes:
      - ./docker/ojp/ui/vite.config.js:/app/vite.config.js
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5173/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3