---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats-exporter
  namespace: a8-turbo-monitoring
  labels:
    app.kubernetes.io/name: nats-exporter
    app.kubernetes.io/component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nats-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nats-exporter
        app.kubernetes.io/component: monitoring
    spec:
      containers:
      - name: nats-exporter
        image: natsio/prometheus-nats-exporter:latest
        ports:
        - containerPort: 7777
          name: metrics
        args:
        - -varz
        - -connz
        - -routez
        - -subz
        - -gatewayz
        - -leafz
        - -jsz=all
        - http://nats.a8-turbo:8222
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /metrics
            port: 7777
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /metrics
            port: 7777
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: nats-exporter
  namespace: a8-turbo-monitoring
  labels:
    app.kubernetes.io/name: nats-exporter
    app.kubernetes.io/component: monitoring
spec:
  type: ClusterIP
  ports:
  - port: 7777
    targetPort: 7777
    name: metrics
  selector:
    app.kubernetes.io/name: nats-exporter