# ------------------- 基础配置 -------------------
bind 0.0.0.0
protected-mode no
port 6379
tcp-backlog 511

# ------------------- 持久化配置 -------------------
# 启用 AOF（Append Only File）持久化
appendonly yes
# 每秒 fsync，兼顾性能与安全
appendfsync everysec
# AOF 文件存放目录（Docker 中挂载的卷）
dir /data

# ------------------- 其他推荐设置 -------------------
# RDB 快照（可选）
save 900 1
save 300 10
save 60 10000

# 关闭 RDB 持久化（仅使用 AOF）
stop-writes-on-bgsave-error no
