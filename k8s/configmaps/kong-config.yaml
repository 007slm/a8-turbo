apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-config
  namespace: a8-turbo
  labels:
    app.kubernetes.io/name: kong
    app.kubernetes.io/component: gateway
data:
  kong.conf: |
    # Kong configuration file
    # See https://docs.konghq.com/gateway/latest/reference/configuration/

    # Database settings
    database = off

    # Declarative config file
    declarative_config = /opt/kong/kong.yml

    # Proxy settings
    proxy_listen = 0.0.0.0:8000, 0.0.0.0:8443 ssl

    # Admin API settings
    admin_listen = 0.0.0.0:8001, 0.0.0.0:8444 ssl

    # Log level
    log_level = notice

    # Prefix
    prefix = /usr/local/kong

    # Allow access to Admin API from other containers in the same network
    trusted_ips = 0.0.0.0/0
  
  kong.yml: |
    _format_version: "3.0"
    _transform: true

    services:
    - name: ojp-server
      url: http://ojp-server.a8-turbo:8010
      routes:
      - name: ojp-server-api
        paths:
        - /api/
        strip_path: false
        preserve_host: true

    - name: shopservice
      url: http://shopservice.a8-turbo:8280
      routes:
      - name: shopservice-api
        paths:
        - /shop/
        strip_path: true
        preserve_host: true

    - name: grafana
      url: http://grafana.a8-turbo-monitoring:3000
      routes:
      - name: grafana-ui
        paths:
        - /grafana
        strip_path: false
        preserve_host: true

    - name: prometheus
      url: http://prometheus.a8-turbo-monitoring:9090
      routes:
      - name: prometheus-ui
        paths:
        - /prometheus
        strip_path: true
        preserve_host: true

    - name: nats-dashboard
      url: http://nats-dashboard.a8-turbo
      routes:
      - name: nats-dashboard-ui
        paths:
        - /nats-dashboard
        strip_path: true
        preserve_host: true

    - name: phpredmin
      url: http://phpredmin.a8-turbo
      routes:
      - name: phpredmin-ui
        paths:
        - /phpredmin
        strip_path: false
        preserve_host: true

    - name: ojp-ui
      url: http://ojp-ui.a8-turbo:5173
      routes:
      - name: ojp-ui-main
        paths:
        - /
        strip_path: true
        preserve_host: true

    # Kong Admin API代理服务
    - name: kong-admin
      url: http://kong.a8-turbo:8001
      routes:
      - name: kong-admin-api
        paths:
        - /kong-admin
        strip_path: true
        preserve_host: true