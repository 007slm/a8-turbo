apiVersion: v1
kind: ConfigMap
metadata:
  name: flink-config
  namespace: a8-turbo
  labels:
    app.kubernetes.io/name: flink
    app.kubernetes.io/component: stream-processing
data:
  flink-cdc-init.sh: |
    #!/bin/bash
    
    # 设置错误时退出
    set -e
    
    echo "开始Flink CDC初始化..."
    
    # 等待Flink JobManager启动
    echo "等待Flink JobManager启动..."
    FLINK_JOBMANAGER_URL="http://flink-jobmanager.a8-turbo:8081"
    MAX_WAIT_TIME=300  # 最大等待时间（秒）
    WAIT_INTERVAL=10   # 检查间隔（秒）
    ELAPSED_TIME=0
    
    while [ $ELAPSED_TIME -lt $MAX_WAIT_TIME ]; do
        if curl -f -s "$FLINK_JOBMANAGER_URL/overview" > /dev/null 2>&1; then
            echo "Flink JobManager已就绪"
            break
        fi
        echo "等待Flink JobManager启动... ($ELAPSED_TIME/$MAX_WAIT_TIME 秒)"
        sleep $WAIT_INTERVAL
        ELAPSED_TIME=$((ELAPSED_TIME + WAIT_INTERVAL))
    done
    
    if [ $ELAPSED_TIME -ge $MAX_WAIT_TIME ]; then
        echo "错误：Flink JobManager启动超时"
        exit 1
    fi
    
    # 提交CDC作业
    echo "提交Flink CDC作业..."
    
    # 检查作业JAR文件是否存在
    CDC_JAR="/opt/flink/jobs/flink-cdc-mysql-1.0.jar"
    if [ ! -f "$CDC_JAR" ]; then
        echo "错误：CDC作业JAR文件不存在: $CDC_JAR"
        exit 1
    fi
    
    # 提交作业
    /opt/flink/bin/flink run \
        --jobmanager $FLINK_JOBMANAGER_URL \
        --class com.example.FlinkCDCJob \
        $CDC_JAR
    
    if [ $? -eq 0 ]; then
        echo "Flink CDC作业提交成功"
    else
        echo "错误：Flink CDC作业提交失败"
        exit 1
    fi
    
    echo "Flink CDC初始化完成"