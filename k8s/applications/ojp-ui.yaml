apiVersion: apps/v1
kind: Deployment
metadata:
  name: ojp-ui
  namespace: a8-turbo
  labels:
    app.kubernetes.io/name: ojp-ui
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ojp-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ojp-ui
        app.kubernetes.io/component: frontend
    spec:
      containers:
      - name: ojp-ui
        image: ojp-ui:latest
        ports:
        - containerPort: 80
          name: http
        env:
        - name: VITE_API_BASE_URL
          value: "http://kong.a8-turbo:8000"
        - name: VITE_OJP_SERVER_URL
          value: "http://kong.a8-turbo:8000/ojp-server"
        - name: VITE_SHOPSERVICE_URL
          value: "http://kong.a8-turbo:8000/shopservice"
        - name: VITE_WEBSOCKET_URL
          value: "ws://kong.a8-turbo:8000/ws"
        - name: NGINX_HOST
          value: "0.0.0.0"
        - name: NGINX_PORT
          value: "80"
        volumeMounts:
        - name: ojp-ui-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: nginx.conf
        - name: ojp-ui-env-config
          mountPath: /usr/share/nginx/html/config.js
          subPath: config.js
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: ojp-ui-config
        configMap:
          name: ojp-ui-config
      - name: ojp-ui-env-config
        configMap:
          name: ojp-ui-config

---
apiVersion: v1
kind: Service
metadata:
  name: ojp-ui
  namespace: a8-turbo
  labels:
    app.kubernetes.io/name: ojp-ui
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
    name: http
  selector:
    app.kubernetes.io/name: ojp-ui