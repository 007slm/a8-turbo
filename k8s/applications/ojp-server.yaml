apiVersion: apps/v1
kind: Deployment
metadata:
  name: ojp-server
  namespace: a8-turbo
  labels:
    app.kubernetes.io/name: ojp-server
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ojp-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ojp-server
        app.kubernetes.io/component: backend
    spec:
      containers:
      - name: ojp-server
        image: ojp-server:latest
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "k8s"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://mysql.a8-turbo:3306/ojp?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
        - name: SPRING_DATASOURCE_USERNAME
          value: "root"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "123456"
        - name: SPRING_REDIS_HOST
          value: "redis.a8-turbo"
        - name: SPRING_REDIS_PORT
          value: "6379"
        - name: NATS_URL
          value: "nats://nats.a8-turbo:4222"
        - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
          value: "*"
        - name: MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS
          value: "always"
        - name: LOGGING_LEVEL_COM_OJP
          value: "DEBUG"
        volumeMounts:
        - name: ojp-server-config
          mountPath: /app/config/application-k8s.yml
          subPath: application-k8s.yml
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5
      volumes:
      - name: ojp-server-config
        configMap:
          name: ojp-server-config

---
apiVersion: v1
kind: Service
metadata:
  name: ojp-server
  namespace: a8-turbo
  labels:
    app.kubernetes.io/name: ojp-server
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  selector:
    app.kubernetes.io/name: ojp-server