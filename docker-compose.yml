include:
  - ./docker-compose-cdc-sync.yml
  - ./docker-compose-smart-cache.yml

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - a8


  grafana:
    image: smartcache/grafana
    build: ./docker/grafana
    hostname: grafana
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - a8
    depends_on:
      - prometheus
    volumes:
      - ./docker/nats/dashboard/nats-dashboard.json:/var/lib/grafana/dashboards/nats-dashboard.json
      - ./docker/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources

networks:
  a8:
    external: false