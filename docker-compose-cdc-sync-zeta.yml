version: '3.8'

services:
  seatunnel-master:
    image: apache/seatunnel
    environment:
      - ST_DOCKER_MEMBER_LIST=seatunnel-master,seatunnel-worker1
    entrypoint: >
      /bin/sh -c "
      /opt/seatunnel/bin/seatunnel-cluster.sh -r master
      "    
    ports:
      - "5801:5801"
      - "8080:8080"
    networks:
      - a8
      

  seatunnel-worker1:
    image: apache/seatunnel
    environment:
      - ST_DOCKER_MEMBER_LIST=seatunnel-master,seatunnel-worker1
    entrypoint: >
      /bin/sh -c "
      /opt/seatunnel/bin/seatunnel-cluster.sh -r worker
      " 
    depends_on:
      - seatunnel-master
    networks:
      - a8

  # Auto-submit default job to the Zeta master once it is up
  seatunnel-submit:
    image: apache/seatunnel
    depends_on:
      - seatunnel-master
    environment:
      - ST_DOCKER_MEMBER_LIST=seatunnel-master:5801
      - JOB_NAME=mysql-to-starrocks
      - JOB_ID=2
    volumes:
      - ./docker/seatunnel/jobs:/config:ro
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting master to be ready...';
      sleep 10;
      echo '取消之前的job:mysql_to_sr_default';
      /opt/seatunnel/bin/seatunnel.sh -can 2 || true;
      echo '提交新的job:mysql-to-starrocks - 2';
      /opt/seatunnel/bin/seatunnel.sh --async -n mysql-to-starrocks --set-job-id 2 -c /config/mysql_to_starrocks.conf
      "
    restart: "no"
    networks:
      - a8
