# 生产环境配置文件
# 使用方式: java -jar app.jar --spring.profiles.active=prod

spring:
  # DevTools 在生产环境中完全禁用
  devtools:
    restart:
      enabled: false
    livereload:
      enabled: false
    add-properties: false  # 禁用DevTools属性默认值

# 生产环境日志配置
logging:
  level:
    org.springframework.boot.devtools: OFF
    org.springframework.grpc: INFO
    io.grpc: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/ojp-server-prod.log
    max-size: 100MB
    max-history: 30

# 生产环境管理端点配置 - 更严格的安全设置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /api/actuator
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized