services:
  # OJP UI服务
  a8-ui:
    build:
      context: ./ojp/ojp-ui
      dockerfile: Dockerfile
    image: ojp-ui:latest
    container_name: a8-ui
    # 移除对外暴露的端口，通过Kong网关访问
    # ports:
    #   - "5173:5173"
    entrypoint: [ "sh", "-lc" ]
    command: |
      set -e
      echo "[a8-ui] waiting for a8-dbproxy:8010 health..."
      for i in $(seq 1 120); do
        wget --no-verbose --tries=1 --spider http://a8-dbproxy:8010/api/actuator/health >/dev/null 2>&1 && break || sleep 1
      done
      wget --no-verbose --tries=1 --spider http://a8-dbproxy:8010/api/actuator/health >/dev/null 2>&1 || { echo "[a8-ui] a8-dbproxy not ready after 120s"; exit 1; }
      echo "[a8-ui] waiting for shopservice:8280 health..."
      for i in $(seq 1 120); do
        wget --no-verbose --tries=1 --spider http://shopservice:8280/actuator/health >/dev/null 2>&1 && break || sleep 1
      done
      wget --no-verbose --tries=1 --spider http://shopservice:8280/actuator/health >/dev/null 2>&1 || { echo "[a8-ui] shopservice not ready after 120s"; exit 1; }
      exec npm run dev -- --host 0.0.0.0 --config /app/vite.config.js
    networks:
      - a8

    volumes:
      - ./docker/ojp/ui/vite.config.js:/app/vite.config.js
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5173/health" ]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
