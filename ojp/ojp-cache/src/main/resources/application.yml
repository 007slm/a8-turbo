# OJP Cache Module Configuration
# This configuration will be used when ojp-cache is included as a module

# OJP Cache Configuration
ojp:
  cache:
    enabled: true
    default-ttl: 300
    max-ttl: 3600
    min-ttl: 60
    
    # Query statistics configuration
    query-stats:
      enabled: true
      max-queries: 10000
      cleanup-interval: 3600
    
    # Cache rule configuration
    cache-rules:
      enabled: true
      default-enabled: true
      max-rules: 1000
    
    # Redis configuration
    redis:
      key-prefix: "ojp:cache:"
      rule-key-prefix: "ojp:cache:rules:"
      query-key-prefix: "ojp:cache:queries:"
      default-expiration: 1800
    
    # Performance configuration
    performance:
      async-enabled: true
      batch-size: 100
      thread-pool-size: 10