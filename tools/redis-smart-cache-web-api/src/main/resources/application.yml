server:
  port: 8010
  servlet:
    context-path: /
  tomcat:
    max-threads: 200
    max-connections: 8192

spring:
  application:
    name: redis-smart-cache-web-api
  
  # Redis配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      password: ${REDIS_PASSWORD:}
      username: ${REDIS_USERNAME:default}
      ssl:
        enabled: ${REDIS_SSL:false}
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 2000ms

  # JSON配置
  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: true
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: NON_NULL
    time-zone: GMT+8

  # 多文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

# Smart Cache特定配置
smartcache:
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    database: ${REDIS_DATABASE:0}
    password: ${REDIS_PASSWORD:}
    username: ${REDIS_USERNAME:default}
    ssl: ${REDIS_SSL:false}
    timeout: ${REDIS_TIMEOUT:10000}
  
  application:
    name: ${SMARTCACHE_APP_NAME:smartcache}
  
  # 性能配置
  performance:
    query-cache-size: 1000
    table-cache-size: 500
    stats-cache-ttl: 300

# SpringDoc OpenAPI配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    display-request-duration: true
    groups-order: DESC
    operations-sorter: method
    disable-swagger-default-url: true
    try-it-out-enabled: true
  
  # 分组配置
  group-configs:
    - group: 'redis-connection'
      display-name: 'Redis连接管理'
      paths-to-match: '/api/redis/**'
    - group: 'query-management'
      display-name: '查询管理'
      paths-to-match: '/api/queries/**'
    - group: 'table-management'
      display-name: '表格管理'
      paths-to-match: '/api/tables/**'
    - group: 'rule-management'
      display-name: '规则管理'
      paths-to-match: '/api/rules/**'
    - group: 'stats-monitoring'
      display-name: '统计监控'
      paths-to-match: '/api/stats/**'
    - group: 'config-management'
      display-name: '配置管理'
      paths-to-match: '/api/config/**'

# Spring Boot Actuator配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      show-components: always
  health:
    redis:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}

# 日志配置
logging:
  level:
    com.redis.smartcache: DEBUG
    org.springframework.web: INFO
    io.lettuce.core: WARN
    org.springframework.data.redis: WARN
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n'
    file: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n'
  file:
    name: logs/redis-smart-cache-web-api.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30
      total-size-cap: 3GB

---
# 开发环境配置
spring:
  config:
    activate:
      on-profile: dev
  
logging:
  level:
    com.redis.smartcache: DEBUG
    org.springframework: DEBUG

smartcache:
  redis:
    host: localhost
    port: 6379
  performance:
    query-cache-size: 100
    table-cache-size: 50

---
# 生产环境配置
spring:
  config:
    activate:
      on-profile: prod

logging:
  level:
    com.redis.smartcache: INFO
    org.springframework: WARN
  
smartcache:
  performance:
    query-cache-size: 5000
    table-cache-size: 2000

server:
  tomcat:
    max-threads: 500
    max-connections: 20000

---
# 测试环境配置
spring:
  config:
    activate:
      on-profile: test

smartcache:
  redis:
    host: localhost
    port: 6379
    database: 1
  application:
    name: smartcache-test