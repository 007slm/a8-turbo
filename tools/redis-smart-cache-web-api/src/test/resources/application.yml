spring:
  profiles:
    active: test

  # Redis测试配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 1  # 使用不同的数据库避免与开发环境冲突
      password: ""
      timeout: 5000ms

# Smart Cache测试配置
smartcache:
  redis:
    host: localhost
    port: 6379
    database: 1
    password: ""
    timeout: 5000
  
  application:
    name: smartcache-test

# 测试环境日志配置
logging:
  level:
    com.redis.smartcache: DEBUG
    org.springframework.test: INFO
    org.springframework.web: DEBUG
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n'

# 禁用某些自动配置以加快测试速度
spring.autoconfigure.exclude:
  - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration