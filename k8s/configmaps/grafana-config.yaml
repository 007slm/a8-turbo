apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: a8-turbo-monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: monitoring
data:
  grafana.ini: |
    [security]
    # 设置为true允许Grafana页面被嵌入到iframe中
    allow_embedding = true

    # 设置cookie安全选项
    cookie_secure = true

    # 设置cookie的SameSite属性为none以允许跨站使用
    cookie_samesite = none
  
  datasources.yml: |
    apiVersion: 1

    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.a8-turbo-monitoring:9090
        isDefault: true
        editable: true
  
  dashboards.yml: |
    apiVersion: 1

    providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards