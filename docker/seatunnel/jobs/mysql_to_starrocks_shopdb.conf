env {
  execution.parallelism = 1
  job.mode = "STREAMING"
  checkpoint.interval = 10000
}

source {
  MySQL-CDC {
    result_table_name = shopdb_products
    url = "jdbc:mysql://mysql:3306/shopdb"
    username = "root"
    password = "a8"
    table-pattern = "shopdb.*"
    server-time-zone = "UTC"
    snapshot.split.size = 8096
    scan.startup.mode = "initial"
    schema-changes.enabled = true
    base-url = "jdbc:mysql://mysql:3306"
  }
}

transform {
  # Optional: pass-through; you can add column mappings or filtering here
}

sink {
  StarRocks {
    nodeUrls = ["starrocks:8040"]
    base-url = "jdbc:mysql://starrocks:9030"
    username = "root"
    password = ""
    database = "shopdb"

    # Stream Load properties
    sink.properties.format = "json"
    sink.properties.strip_outer_array = "true"
    sink.properties.ignore_json_size = "true"

    # Create target table automatically if not exists (if supported by connector)
    sink.create_table.enable = true
  }
}