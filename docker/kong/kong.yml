_format_version: "3.0"
_transform: true

services:
- name: ojp-server
  url: http://ojp-server:8010
  routes:
  - name: ojp-server-api
    paths:
    - /api/
    strip_path: false
    preserve_host: true

- name: shopservice
  url: http://shopservice:8280
  routes:
  - name: shopservice-api
    paths:
    - /shop/
    strip_path: true
    preserve_host: true

- name: grafana
  url: http://grafana:3000
  routes:
  - name: grafana-ui
    paths:
    - /grafana
    strip_path: false
    preserve_host: true

- name: prometheus
  url: http://prometheus:9090
  routes:
  - name: prometheus-ui
    paths:
    - /prometheus
    strip_path: true
    preserve_host: true

- name: phpredmin
  url: http://phpredmin
  routes:
  - name: phpredmin-ui
    paths:
    - /phpredmin
    strip_path: false
    preserve_host: true

- name: ojp-ui
  url: http://ojp-ui:3000
  routes:
  - name: ojp-ui-main
    paths:
    - /
    strip_path: true
    preserve_host: true

- name: flink-jobmanager
  url: http://jobmanager:8081
  routes:
  - name: flink-jobmanager-ui
    paths:
    - /flink
    strip_path: true
    preserve_host: true

- name: seatunnel-master
  url: http://seatunnel-master:8080
  routes:
  - name: seatunnel-master
    paths:
    - /seatunnel
    strip_path: true
    preserve_host: true

- name: starrocks-fe
  url: http://starrocks:8030
  routes:
  - name: starrocks-fe-ui
    paths:
    - /starrocks
    strip_path: true
    preserve_host: true

# Kong Admin API代理服务
- name: kong-admin
  url: http://kong:8001
  routes:
  - name: kong-admin-api
    paths:
    - /kong-admin
    strip_path: true
    preserve_host: true

- name: ojp-sql-translator
  url: http://ojp-sql-translator:8000
  routes:
  - name: ojp-sql-translator-api
    paths:
    - /sql-translator
    strip_path: true
    preserve_host: true

- name: skywalking-ui
  url: http://skywalking-ui:80
  routes:
  - name: skywalking-ui-route
    paths:
    - /skywalking
    strip_path: true
    preserve_host: true

- name: skywalking-oap
  url: http://skywalking-oap:12800
  routes:
  - name: skywalking-oap-route
    paths:
    - /skywalking-oap
    strip_path: true
    preserve_host: true
