# ?? MySQL Connector
debezium.source.connector.class=io.debezium.connector.mysql.MySqlConnector

# ???????
debezium.source.database.hostname=mysql
debezium.source.database.port=3306
debezium.source.database.user=smartcache
debezium.source.database.password=smartcache
debezium.source.database.dbname=smartcache
debezium.source.database.server.name=mysql-server
debezium.source.database.server.id=1234



# ???????
debezium.source.database.allowPublicKeyRetrieval=true
debezium.source.database.serverTimezone=UTC
debezium.source.database.include.schema=true
debezium.source.database.include.database=true

# ?????
debezium.source.offset.storage.file.filename=data/offsets.dat
debezium.source.offset.flush.interval.ms=0

debezium.source.topic.prefix=mysql

debezium.sink.type=nats-jetstream
debezium.sink.nats-jetstream.url=nats://nats:4222
debezium.sink.nats-jetstream.create-stream=false
debezium.sink.nats-jetstream.stream=slm
debezium.sink.nats-jetstream.subjects=mysql.*.*

debezium.format.value=json


debezium.source.schema.history.internal=io.debezium.storage.file.history.FileSchemaHistory
debezium.source.schema.history.internal.file.filename=data/dbhistory.dat


# ############ SET LOG LEVELS ############
quarkus.log.level=INFO
quarkus.log.console.json=false
quarkus.log.console.format="%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{2}] (%t) %s%e%n"
