apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-jobmanager
  namespace: a8-turbo
  labels:
    app.kubernetes.io/name: flink-jobmanager
    app.kubernetes.io/component: streaming
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: flink-jobmanager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flink-jobmanager
        app.kubernetes.io/component: streaming
    spec:
      containers:
      - name: jobmanager
        image: flink:1.18-scala_2.12-java11
        args: ["jobmanager"]
        ports:
        - containerPort: 6123
          name: rpc
        - containerPort: 6124
          name: blob-server
        - containerPort: 8081
          name: webui
        env:
        - name: FLINK_PROPERTIES
          value: |
            jobmanager.rpc.address: flink-jobmanager
            taskmanager.numberOfTaskSlots: 2
            parallelism.default: 1
            jobmanager.execution.failover-strategy: region
            state.backend: filesystem
            state.checkpoints.dir: file:///opt/flink/checkpoints
            state.savepoints.dir: file:///opt/flink/savepoints
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-taskmanager
  namespace: a8-turbo
  labels:
    app.kubernetes.io/name: flink-taskmanager
    app.kubernetes.io/component: streaming
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: flink-taskmanager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flink-taskmanager
        app.kubernetes.io/component: streaming
    spec:
      containers:
      - name: taskmanager
        image: flink:1.18-scala_2.12-java11
        args: ["taskmanager"]
        ports:
        - containerPort: 6122
          name: rpc
        - containerPort: 6125
          name: query-state
        env:
        - name: FLINK_PROPERTIES
          value: |
            jobmanager.rpc.address: flink-jobmanager
            taskmanager.numberOfTaskSlots: 2
            parallelism.default: 1
            taskmanager.memory.process.size: 1728m
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"

---
apiVersion: v1
kind: Service
metadata:
  name: flink-jobmanager
  namespace: a8-turbo
  labels:
    app.kubernetes.io/name: flink-jobmanager
    app.kubernetes.io/component: streaming
spec:
  type: ClusterIP
  ports:
  - port: 6123
    targetPort: 6123
    name: rpc
  - port: 6124
    targetPort: 6124
    name: blob-server
  - port: 8081
    targetPort: 8081
    name: webui
  selector:
    app.kubernetes.io/name: flink-jobmanager

---
apiVersion: v1
kind: Service
metadata:
  name: flink-taskmanager
  namespace: a8-turbo
  labels:
    app.kubernetes.io/name: flink-taskmanager
    app.kubernetes.io/component: streaming
spec:
  type: ClusterIP
  ports:
  - port: 6122
    targetPort: 6122
    name: rpc
  - port: 6125
    targetPort: 6125
    name: query-state
  selector:
    app.kubernetes.io/name: flink-taskmanager

---
apiVersion: batch/v1
kind: Job
metadata:
  name: flink-cdc-init
  namespace: a8-turbo
  labels:
    app.kubernetes.io/name: flink-cdc-init
    app.kubernetes.io/component: streaming
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flink-cdc-init
        app.kubernetes.io/component: streaming
    spec:
      restartPolicy: OnFailure
      containers:
      - name: cdc-init
        image: flink:1.18-scala_2.12-java11
        command: ["/bin/bash"]
        args: ["/opt/flink/scripts/flink-cdc-init.sh"]
        env:
        - name: FLINK_JOBMANAGER_URL
          value: "http://flink-jobmanager:8081"
        - name: MYSQL_HOST
          value: "mysql.a8-turbo"
        - name: MYSQL_PORT
          value: "3306"
        - name: MYSQL_USER
          value: "root"
        - name: MYSQL_PASSWORD
          value: "123456"
        - name: STARROCKS_HOST
          value: "starrocks.a8-turbo"
        - name: STARROCKS_PORT
          value: "9030"
        - name: NATS_URL
          value: "nats://nats.a8-turbo:4222"
        volumeMounts:
        - name: flink-scripts
          mountPath: /opt/flink/scripts/flink-cdc-init.sh
          subPath: flink-cdc-init.sh
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
      volumes:
      - name: flink-scripts
        configMap:
          name: flink-config
          defaultMode: 0755