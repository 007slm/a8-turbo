services:
  # OJP Server服务
  ojp-server:
    build:
      context: ./ojp
      dockerfile: ojp-server/Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    image: fluxdb-server:0.0.8-alpha
    container_name: ojp-server
    ports:
      - "8010:8010"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JAVA_OPTS=-Xms512m -Xmx1024m
      - MAVEN_CONFIG=/root/.m2
      - MAVEN_OPTS=-Dmaven.repo.local=/root/.m2/repository
    depends_on:
      - redis
    networks:
      - a8
    volumes:
      - ./docker/ojp/server/logs:/app/logs
      - ./docker/ojp/server/application.yml:/app/config/application.yml
      - C:\Users\007sl\.m2\repository:/root/.m2/repository
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/api/actuator/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # Shop Service服务
  shopservice:
    build:
      context: ./ojp/shopservice
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
        - MAVEN_REPO_PATH=C:/Users/007sl/.m2/repository
        - SHOP_SERVICE_PATH=./ojp/shopservice

    image: fluxdb-shopservice:0.0.7-alpha
    container_name: shopservice
    ports:
      - "8180:8180"
      - "5005:5005"  # Java远程调试端口
    environment:
      - JAVA_OPTS=-Xms256m -Xmx512m -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
      - MAVEN_CONFIG=/root/.m2
      - MAVEN_OPTS=-Dmaven.repo.local=/root/.m2/repository
    depends_on:
      - mysql
      - ojp-server
    networks:
      - a8
    volumes:
      - ./logs/shopservice:/app/logs
      - ./docker/ojp/shopservice/application.properties:/app/config/application.properties

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8180/actuator/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # OJP UI服务
  ojp-ui:
    build:
      context: ./ojp/ojp-ui
      dockerfile: Dockerfile
    image: ojp-ui:latest
    container_name: ojp-ui
    ports:
      - "5173:5173"
    depends_on:
      - ojp-server
      - shopservice
    networks:
      - a8
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5173/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3