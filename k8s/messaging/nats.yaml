apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  namespace: a8-turbo
  labels:
    app.kubernetes.io/name: nats
    app.kubernetes.io/component: messaging
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nats
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nats
        app.kubernetes.io/component: messaging
    spec:
      containers:
      - name: nats
        image: nats:latest
        ports:
        - containerPort: 4222
          name: client
        - containerPort: 8222
          name: monitor
        - containerPort: 6222
          name: cluster
        args:
        - --http_port
        - "8222"
        - --port
        - "4222"
        - --cluster_name
        - "a8-turbo-cluster"
        - --jetstream
        - --store_dir
        - "/data/jetstream"
        - --max_file_store
        - "10GB"
        - --max_mem_store
        - "1GB"
        volumeMounts:
        - name: nats-jetstream-data
          mountPath: /data/jetstream
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8222
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8222
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: nats-jetstream-data
        persistentVolumeClaim:
          claimName: nats-jetstream-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: a8-turbo
  labels:
    app.kubernetes.io/name: nats
    app.kubernetes.io/component: messaging
spec:
  type: ClusterIP
  ports:
  - port: 4222
    targetPort: 4222
    name: client
  - port: 8222
    targetPort: 8222
    name: monitor
  - port: 6222
    targetPort: 6222
    name: cluster
  selector:
    app.kubernetes.io/name: nats

---
apiVersion: batch/v1
kind: Job
metadata:
  name: nats-init
  namespace: a8-turbo
  labels:
    app.kubernetes.io/name: nats-init
    app.kubernetes.io/component: messaging
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nats-init
        app.kubernetes.io/component: messaging
    spec:
      restartPolicy: OnFailure
      containers:
      - name: nats-init
        image: natsio/nats-box:latest
        command:
        - /bin/sh
        - -c
        - |
          echo "等待NATS服务启动..."
          sleep 30
          
          echo "创建CDC流..."
          nats stream add cdc-stream \
            --subjects "cdc.>" \
            --retention limits \
            --max-msgs 1000000 \
            --max-age 24h \
            --storage file \
            --replicas 1 \
            --server nats.a8-turbo:4222
          
          echo "创建监控流..."
          nats stream add monitoring-stream \
            --subjects "monitoring.>" \
            --retention limits \
            --max-msgs 100000 \
            --max-age 1h \
            --storage file \
            --replicas 1 \
            --server nats.a8-turbo:4222
          
          echo "NATS初始化完成"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"