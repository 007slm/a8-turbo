# 同步程序配置文件
source:
  type: mysql
  hostname: 127.0.0.1
  port: 3306
  username: root
  password: password
  tables: "shopdb.users,shopdb.orders,shopdb.products"  # 多个表用逗号分隔
  serverId: "123456"  # 唯一的serverId，避免冲突
  serverTimeZone: Asia/Shanghai

sink:
  type: starrocks
  jdbcUrl: jdbc:mysql://starrocks-host:9030
  loadUrl: starrocks-host:8030
  username: root
  password: password
  tableCreateProperties:
    replication_num: "3"
  sinkBufferFlushMaxBytes: 1048576  # 1MB
  sinkBufferFlushIntervalMs: 1000   # 1秒
  sinkBufferFlushMaxRows: 100       # 100行

pipeline:
  name: mysql-to-starrocks-sync
  parallelism: 2

checkpoint:
  interval: 30000      # 30秒
  timeout: 60000       # 60秒
  minPause: 10000      # 10秒
  tolerableFailureNum: 3
